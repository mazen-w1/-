<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع الطلب - روائع الأفكار الإعلانية</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #4A0E17;
      --primary-dark: #320A10;
      --primary-mid: #631420;
      --accent: #D4AF37;
      --accent-light: #F0D060;
      --gray-light: #F5F5F5;
      --gray-dark: #333;
      --border: #E0E0E0;
    }

    body {
      font-family: 'Changa', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
      color: #333;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      flex-direction: row-reverse;
    }

    .logo-svg {
      width: 80px;
      height: 100px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 42px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      right: 16px;
      font-size: 18px;
      pointer-events: none;
    }

    input[type="search"] {
      width: 100%;
      padding: 14px 16px 14px 48px;
      font-size: 16px;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      font-family: 'Changa', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: all 0.3s ease;
    }

    input[type="search"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74, 14, 23, 0.08);
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: 'Changa', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: all 0.3s ease;
      margin-bottom: 16px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-mid) 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(74, 14, 23, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(74, 14, 23, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--gray-light);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: white;
    }

    .privacy-note {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 16px;
    }

    .success-badge {
      width: 80px;
      height: 80px;
      background: rgba(34, 197, 94, 0.1);
      border: 3px solid #22C55E;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 24px;
      animation: scaleIn 0.4s ease-out;
    }

    @keyframes scaleIn {
      from {
        transform: scale(0.5);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .card {
      background: var(--gray-light);
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 24px;
    }

    .order-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .order-field {
      display: flex;
      flex-direction: column;
    }

    .order-field label {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .order-field value {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
    }

    .progress-container {
      margin-top: 32px;
    }

    .progress-bar {
      height: 6px;
      background: #E0E0E0;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      transition: width 0.4s ease;
    }

    .progress-steps {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .progress-step {
      flex: 1;
      text-align: center;
      opacity: 0.4;
      transition: opacity 0.3s ease;
    }

    .progress-step.active,
    .progress-step.completed {
      opacity: 1;
    }

    .step-indicator {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #E0E0E0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      margin: 0 auto 8px;
      transition: all 0.3s ease;
    }

    .progress-step.active .step-indicator {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 0 4px rgba(74, 14, 23, 0.1);
    }

    .progress-step.completed .step-indicator {
      background: #22C55E;
      color: white;
    }

    .step-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      line-height: 1.3;
    }

    .details-section h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #E0E0E0;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 14px;
      color: #1a1a1a;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 32px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #991B1B;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      font-weight: 500;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .container {
        max-width: 100%;
        padding: 24px;
      }

      .header-brand {
        gap: 12px;
        margin-bottom: 40px;
      }

      .logo-svg {
        width: 60px;
        height: 80px;
      }

      .brand-name {
        font-size: 24px;
      }

      h1 {
        font-size: 32px;
      }

      .card {
        padding: 24px;
      }

      .order-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .progress-steps {
        flex-wrap: wrap;
      }

      .progress-step {
        flex: 0 0 calc(33.333% - 8px);
      }

      .detail-row {
        grid-template-columns: 100px 1fr;
      }

      .action-buttons {
        grid-template-columns: 1fr;
      }

      .subtitle {
        margin-bottom: 32px;
      }
    }
  </style>
</head>
<body>
  <!-- PAGE 1: SEARCH ORDER -->
  <div id="searchPage" class="page active">
    <div class="container">
      <div class="header-brand">
        <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140">
          <defs>
            <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#B08D2B;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect x="32" y="10" width="5" height="50" fill="url(#goldGradient)" rx="2.5"/>
          <text x="60" y="75" font-family="Changa, Arial" font-size="85" font-weight="800" fill="#4A0E17" text-anchor="end">ر</text>
        </svg>
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
          <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
            <div class="brand-dot"></div>
            <span class="brand-name">روائع الأفكار</span>
          </div>
        </div>
      </div>

      <h1>تتبع الطلب</h1>
      <p class="subtitle">أدخل رقم الطلب أو رقم الجوال لمتابعة حالة طلبك</p>

      <div class="input-group">
        <div class="input-wrapper">
          <span class="input-icon">🔍</span>
          <input type="search" id="searchInput" placeholder="رقم الطلب أو رقم الجوال" />
        </div>
      </div>

      <button class="btn btn-primary" onclick="searchOrder()">تتبع الطلب</button>

      <p class="privacy-note">لن يتم استخدام بياناتك إلا لعرض حالة الطلب.</p>
    </div>
  </div>

  <!-- PAGE 2: ORDER STATUS -->
  <div id="statusPage" class="page">
    <div class="container">
      <div class="header-brand" style="margin-bottom: 40px;">
        <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140">
          <defs>
            <linearGradient id="goldGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#B08D2B;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect x="32" y="10" width="5" height="50" fill="url(#goldGradient2)" rx="2.5"/>
          <text x="60" y="75" font-family="Changa, Arial" font-size="85" font-weight="800" fill="#4A0E17" text-anchor="end">ر</text>
        </svg>
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
          <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
            <div class="brand-dot"></div>
            <span class="brand-name">روائع الأفكار</span>
          </div>
        </div>
      </div>

      <div class="success-badge">✓</div>
      <h1>تم العثور على طلبك</h1>

      <div class="card">
        <div class="order-grid">
          <div class="order-field">
            <label>رقم الطلب</label>
            <value id="orderNumber">—</value>
          </div>
          <div class="order-field">
            <label>اسم العميل</label>
            <value id="customerName">—</value>
          </div>
          <div class="order-field">
            <label>تاريخ الطلب</label>
            <value id="orderDate">—</value>
          </div>
          <div class="order-field">
            <label>تاريخ التسليم المتوقع</label>
            <value id="estimatedDelivery">—</value>
          </div>
        </div>

        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-steps" id="progressSteps"></div>
        </div>
      </div>

      <div class="card">
        <div class="details-section">
          <h3>تفاصيل الطلب</h3>
          <div class="details-grid">
            <div class="detail-row">
              <div class="detail-label">العميل</div>
              <div class="detail-value" id="detailCustomer">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">مندوب المبيعات</div>
              <div class="detail-value" id="detailRepresentative">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">نوع الطلب</div>
              <div class="detail-value" id="detailService">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">طريقة التسليم</div>
              <div class="detail-value" id="detailDeliveryMethod">توصيل</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">تاريخ التسليم</div>
              <div class="detail-value" id="detailDeliveryDate">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">ملاحظات</div>
              <div class="detail-value" id="detailNotes">—</div>
            </div>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn btn-secondary" onclick="backToSearch()">تتبع طلب آخر</button>
        <button class="btn btn-primary" onclick="viewFullDetails()">عرض التفاصيل</button>
      </div>
    </div>
  </div>

  <script>
    // Stage configuration
    const stages = [
      { id: 'design', label: 'تم استلام الطلب' },
      { id: 'approval', label: 'التصميم' },
      { id: 'print', label: 'الطباعة' },
      { id: 'workshop', label: 'التنفيذ' },
      { id: 'done', label: 'تم التسليم' }
    ];

    let currentOrder = null;

    /**
     * Get all orders from localStorage
     */
    function getAllOrders() {
      try {
        const stored = localStorage.getItem('rawaee_orders');
        if (stored) {
          return JSON.parse(stored);
        }
      } catch (e) {
        console.error('Error reading orders from localStorage:', e);
      }
      return {};
    }

    /**
     * Normalize phone number for consistent matching
     */
    function normalizePhone(phone) {
      if (!phone) return '';
      return String(phone).replace(/\s+/g, '').replace(/^(\+966|0)?/, '');
    }

    /**
     * Search for an order
     */
    function searchOrder() {
      const searchInput = document.getElementById('searchInput').value.trim();

      if (!searchInput) {
        showError('الرجاء إدخال رقم الطلب أو رقم الجوال');
        return;
      }

      const orders = getAllOrders();

      if (Object.keys(orders).length === 0) {
        showError('لا توجد طلبات في النظام حالياً');
        return;
      }

      // Search by order ID or phone number
      let found = null;
      const normalizedSearch = normalizePhone(searchInput);

      for (const [id, order] of Object.entries(orders)) {
        if (id === searchInput || order.id === searchInput) {
          found = { id, ...order };
          break;
        }
        if (normalizePhone(order.phone) === normalizedSearch) {
          found = { id, ...order };
          break;
        }
      }

      if (!found) {
        showError('لم يتم العثور على طلب مطابق. تحقق من البيانات المدخلة.');
        return;
      }

      currentOrder = found;
      displayOrder();
    }

    /**
     * Display order details
     */
    function displayOrder() {
      const order = currentOrder;
      const currentStageIndex = stages.findIndex(s => s.id === (order.currentDept || 'design'));

      // Set order fields
      document.getElementById('orderNumber').textContent = order.id || '—';
      document.getElementById('customerName').textContent = order.client || '—';
      document.getElementById('orderDate').textContent = formatDate(order.createdAt) || '—';
      document.getElementById('estimatedDelivery').textContent = formatDate(order.deliveryDate) || '—';

      // Set detail fields
      document.getElementById('detailCustomer').textContent = order.client || '—';
      document.getElementById('detailRepresentative').textContent = order.representative || '—';
      document.getElementById('detailService').textContent = order.service || '—';
      document.getElementById('detailDeliveryDate').textContent = formatDate(order.deliveryDate) || '—';
      document.getElementById('detailNotes').textContent = order.notes || 'لا توجد ملاحظات';

      // Update progress bar
      const progressPercent = Math.min(((currentStageIndex + 1) / stages.length) * 100, 100);
      document.getElementById('progressFill').style.width = progressPercent + '%';

      // Update progress steps
      const stepsHTML = stages.map((stage, index) => {
        let statusClass = 'upcoming';
        let indicator = index + 1;

        if (index < currentStageIndex) {
          statusClass = 'completed';
          indicator = '✓';
        } else if (index === currentStageIndex) {
          statusClass = 'active';
        }

        return `<div class="progress-step ${statusClass}">
          <div class="step-indicator">${indicator}</div>
          <div class="step-label">${stage.label}</div>
        </div>`;
      }).join('');

      document.getElementById('progressSteps').innerHTML = stepsHTML;

      // Switch pages
      document.getElementById('searchPage').classList.remove('active');
      document.getElementById('statusPage').classList.add('active');
    }

    /**
     * Show error message
     */
    function showError(message) {
      const container = document.querySelector('#searchPage .container');
      const existingError = container.querySelector('.error-message');

      if (existingError) existingError.remove();

      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message';
      errorDiv.textContent = message;
      container.insertBefore(errorDiv, container.querySelector('.input-group'));
    }

    /**
     * Go back to search page
     */
    function backToSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('statusPage').classList.remove('active');
      document.getElementById('searchPage').classList.add('active');
      const error = document.querySelector('.error-message');
      if (error) error.remove();
    }

    /**
     * View full details (placeholder)
     */
    function viewFullDetails() {
      alert('عرض التفاصيل الكاملة قريباً');
    }

    /**
     * Format date for display
     */
    function formatDate(timestamp) {
      if (!timestamp) return '';
      try {
        const date = new Date(timestamp);
        if (isNaN(date.getTime())) return '';
        return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch {
        return '';
      }
    }

    /**
     * Handle Enter key on search input
     */
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchOrder();
    });

    /**
     * Auto-load if order ID in URL
     */
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');

    if (orderId) {
      window.addEventListener('load', () => {
        const orders = getAllOrders();
        if (orders[orderId]) {
          currentOrder = { id: orderId, ...orders[orderId] };
          displayOrder();
        } else {
          showError('لم يتم العثور على الطلب المطلوب');
        }
      });
    }
  </script>
</body>
</html>
