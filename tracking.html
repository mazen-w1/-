<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تتبع الطلب — روائع الأفكار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Changa:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --maroon:#4A0E17;
      --maroon-mid:#631420;
      --gold:#D4AF37;
      --gold-soft:rgba(212,175,55,.12);
      --surface:#FFFFFF;
      --surface-2:#FDFBF7;
      --border:#E8E2D9;
      --border-soft:#F0EBE3;
      --text-1:#1A0F0A;
      --text-2:#5C4A3A;
      --text-3:#9B8878;
      --radius-lg:18px;
      --radius-xl:24px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;}
    body{
      font-family:'Cairo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      color:var(--text-1);
      line-height:1.6;
      min-height:100vh;
      position:relative;
    }
    /* Same dark radial-gradient background as the app's unified login portal */
    .portal-bg{position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,#3a1016 0%,#1a0a0c 60%,#0d0507 100%);z-index:0;}
    .portal-wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
    .page{display:none;width:100%;max-width:520px;flex-direction:column;align-items:center;}
    .page.active{display:flex;}

    .portal-header{text-align:center;margin-bottom:28px;}
    .p-logo{width:82px;height:82px;margin:0 auto 14px;border-radius:50%;border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);}
    .p-logo svg{width:100%;height:100%;display:block;}
    .p-title{font-size:24px;font-weight:900;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.5);}
    .p-title span{color:var(--gold);}
    .p-sub{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.5px;margin:4px 0 14px;}
    .p-badge{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);padding:6px 20px;border-radius:30px;font-size:11.5px;font-weight:700;backdrop-filter:blur(8px);}

    .card{
      background:var(--surface);border-radius:var(--radius-xl);
      padding:28px;width:100%;
      box-shadow:0 16px 50px rgba(0,0,0,.5);
      border:2px solid var(--gold);
      text-align:right;
      position:relative;z-index:2;
    }
    .card + .card{margin-top:16px;}

    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
    .fg label{font-size:12px;color:var(--text-2);font-weight:700;}
    .fg input{
      border:1.5px solid var(--border);border-radius:var(--radius-lg);
      padding:13px 44px 13px 16px;font-size:14px;background:var(--surface-2);color:var(--text-1);
      width:100%;font-family:inherit;transition:.15s;
    }
    .fg input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft);}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;top:50%;right:15px;transform:translateY(-50%);color:var(--text-3);font-size:16px;pointer-events:none;}

    .btn{width:100%;padding:14px;font-size:15px;font-weight:800;border:none;border-radius:var(--radius-lg);cursor:pointer;font-family:inherit;transition:.15s;}
    .btn-primary{background:var(--maroon);color:#fff;}
    .btn-primary:hover{background:var(--maroon-mid);}
    .btn-secondary{background:var(--surface-2);color:var(--maroon);border:1.5px solid var(--border);}
    .btn-secondary:hover{border-color:var(--gold);}
    .action-row{display:flex;gap:10px;margin-top:6px;}

    .privacy-note{font-size:11px;color:var(--text-3);text-align:center;margin-top:16px;}
    .error-message{background:#FEF2F2;border:1px solid #FCA5A5;color:#991B1B;padding:12px 16px;border-radius:var(--radius-lg);text-align:center;font-weight:600;font-size:12.5px;margin-bottom:14px;}

    .success-badge{display:flex;align-items:center;justify-content:center;width:52px;height:52px;background:rgba(34,197,94,.1);border-radius:50%;margin:0 auto 14px;font-size:26px;color:#10B981;}
    .result-title{font-size:17px;font-weight:900;color:var(--text-1);text-align:center;margin-bottom:2px;}
    .result-sub{font-size:11.5px;color:var(--text-3);text-align:center;margin-bottom:18px;}

    .dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:0;background:var(--surface-2);border:1px solid var(--border-soft);border-radius:var(--radius-lg);padding:4px 2px;margin-bottom:16px;}
    .di{display:flex;flex-direction:column;gap:2px;padding:8px 10px;}
    .dk{font-size:9px;color:var(--text-3);font-weight:800;letter-spacing:.3px;text-transform:uppercase;}
    .dv{font-size:13px;font-weight:700;color:var(--text-1);}

    /* Sleek circles + thin lines track — same visual language as the internal system's order view */
    .track-row{display:flex;align-items:flex-start;overflow-x:auto;padding:4px 2px 0;margin-bottom:4px;}
    .track-node{display:flex;flex-direction:column;align-items:center;gap:5px;flex:0 0 auto;min-width:52px;}
    .track-dot{width:13px;height:13px;border-radius:50%;background:var(--surface);border:2px solid var(--border);flex-shrink:0;box-sizing:border-box;transition:.25s;}
    .track-dot.done{background:#10B981;border-color:#10B981;}
    .track-dot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft);}
    .track-label{font-size:9.5px;font-weight:700;color:var(--text-3);white-space:nowrap;text-align:center;}
    .track-label.done{color:#059669;}
    .track-label.active{color:var(--maroon);font-weight:800;}
    .track-line{flex:1 1 18px;height:2px;background:var(--border-soft);margin-top:5.5px;min-width:12px;}
    .track-line.done{background:#10B981;}

    .details-section{margin-top:6px;padding-top:16px;border-top:1px solid var(--border-soft);}
    .details-section h3{font-size:11px;font-weight:800;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
    .detail-row{display:flex;justify-content:space-between;gap:14px;padding:6px 0;font-size:12.5px;}
    .detail-row + .detail-row{border-top:1px solid var(--border-soft);}
    .detail-label{color:var(--text-3);font-weight:700;flex-shrink:0;}
    .detail-value{color:var(--text-1);text-align:left;}

    @media (max-width:640px){
      .card{padding:20px;}
      .p-title{font-size:20px;}
    }
  </style>
</head>
<body>
  <div class="portal-bg"></div>
  <div class="portal-wrap">
    <div class="portal-header">
      <div class="p-logo">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="روائع الأفكار">
          <text x="50" y="50" text-anchor="middle" dominant-baseline="central" font-family="'Changa',sans-serif" font-weight="800" font-size="62" fill="#fff">ر</text>
          <rect x="24" y="12" width="5" height="38" rx="2.5" fill="#D4AF37"/>
        </svg>
      </div>
      <div class="p-title"><span>•</span> روائع الأفكار الإعلانية</div>
      <div class="p-sub">RAWAEE AL-AFKAR FOR ADVERTISING</div>
      <div class="p-badge">بوابة تتبع الطلبات العامة</div>
    </div>

    <!-- PAGE 1: SEARCH -->
    <div id="searchPage" class="page active">
      <div class="card">
        <div id="searchErrorSlot"></div>
        <div class="fg">
          <label>رقم الطلب أو رقم الجوال</label>
          <div class="input-wrap">
            <input type="search" id="searchInput" placeholder="مثال: ORD-014 أو 05XXXXXXXX" autocomplete="off"/>
          </div>
        </div>
        <button class="btn btn-primary" id="searchBtn" onclick="searchOrder()">تتبع الطلب</button>
        <div class="privacy-note">لن يتم استخدام بياناتك إلا لعرض حالة طلبك.</div>
      </div>
    </div>

    <!-- PAGE 2: RESULT -->
    <div id="statusPage" class="page">
      <div class="card">
        <div class="success-badge">✓</div>
        <div class="result-title" id="resultClient">—</div>
        <div class="result-sub" id="resultMeta">—</div>

        <div class="dg">
          <div class="di"><span class="dk">رقم الطلب</span><span class="dv" id="orderNumber">—</span></div>
          <div class="di"><span class="dk">تاريخ الطلب</span><span class="dv" id="orderDate">—</span></div>
          <div class="di"><span class="dk">تاريخ التسليم المتوقع</span><span class="dv" id="estimatedDelivery">—</span></div>
        </div>

        <div id="progressTrack"></div>

        <div class="details-section">
          <h3>تفاصيل الطلب</h3>
          <div class="detail-row"><span class="detail-label">الخدمة</span><span class="detail-value" id="detailService">—</span></div>
          <div class="detail-row"><span class="detail-label">أنشئ بواسطة</span><span class="detail-value" id="detailCreatedBy">—</span></div>
          <div class="detail-row"><span class="detail-label">ملاحظات</span><span class="detail-value" id="detailNotes">—</span></div>
        </div>
      </div>
      <div class="action-row">
        <button class="btn btn-secondary" onclick="backToSearch()">تتبع طلب آخر</button>
      </div>
    </div>
  </div>

  <script>
    const FIREBASE_DB_URL = "https://rawaee-alafkar-default-rtdb.firebaseio.com";
    // Mirrors the main system's department sequence (index.html getActiveDepts) so the
    // progress shown here always matches the real record instead of a fixed generic list.
    const DEPT_META = {
      design:   {label:'التصميم'},
      external: {label:'التنفيذ الخارجي'},
      print:    {label:'الطباعة'},
      workshop: {label:'الورشة'}
    };
    var currentOrder = null;

    function toEnglishDigits(str){
      const map={'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9','۰':'0','۱':'1','۲':'2','۳':'3','۴':'4','۵':'5','۶':'6','۷':'7','۸':'8','۹':'9'};
      return String(str||'').replace(/[٠-٩۰-۹]/g,ch=>map[ch]!==undefined?map[ch]:ch);
    }
    function normalizeSaudiPhone(v){
      let s=toEnglishDigits(v).trim().replace(/[^\d+]/g,'');
      if(s.startsWith('+966'))s='0'+s.slice(4);
      else if(s.startsWith('00966'))s='0'+s.slice(5);
      else if(s.startsWith('966')&&s.length>=12)s='0'+s.slice(3);
      else if(/^5\d{8}$/.test(s))s='0'+s;
      return s;
    }
    function getActiveDepts(o){
      const seq=[];
      if(o.designTo&&o.designTo!=='none')seq.push('design');
      if(o.externalTo&&o.externalTo!=='none')seq.push('external');
      if(o.printTo&&o.printTo!=='none')seq.push('print');
      if(o.workshopTo&&o.workshopTo!=='none')seq.push('workshop');
      return seq;
    }

    async function fetchOrders(){
      const res = await fetch(FIREBASE_DB_URL + '/orders.json');
      if(!res.ok) throw new Error('http_' + res.status);
      const data = await res.json();
      return data || {};
    }
    // Narrow Firebase REST queries (equalTo) for exact-match lookups (order key,
    // id field, phone field) so a typical ID/phone search downloads only the
    // matching record(s) instead of the entire /orders collection. Client-name
    // search still requires the full collection as a fallback (see searchOrder),
    // since equalTo needs an exact match and can't express the trimmed/contains
    // comparison used for names.
    function fbEqualToUrl(orderBy, value){
      return FIREBASE_DB_URL + '/orders.json?orderBy=' + encodeURIComponent('"' + orderBy + '"') + '&equalTo=' + encodeURIComponent(JSON.stringify(value));
    }
    async function fbQuery(orderBy, value){
      try{
        const res = await fetch(fbEqualToUrl(orderBy, value));
        if(!res.ok) return {};
        const data = await res.json();
        return data || {};
      }catch(e){ return {}; }
    }
    async function fetchOrdersNarrow(raw, normalizedPhone){
      const merged = {};
      Object.assign(merged, await fbQuery('$key', raw));
      Object.assign(merged, await fbQuery('id', raw));
      Object.assign(merged, await fbQuery('phone', raw));
      if(normalizedPhone && normalizedPhone !== raw){
        Object.assign(merged, await fbQuery('phone', normalizedPhone));
      }
      return merged;
    }
    function findMatch(orders, raw, normalizedPhone){
      const activeOrders = Object.entries(orders || {}).filter(([, order]) => order.currentDept !== 'done');
      return activeOrders.find(([key, order]) =>
        key === raw ||
        (order.id && order.id === raw) ||
        (order.phone && (order.phone === raw || order.phone === normalizedPhone)) ||
        (order.client && order.client.trim() === raw)
      );
    }

    function setSearchError(message){
      const slot = document.getElementById('searchErrorSlot');
      slot.innerHTML = message ? `<div class="error-message"><i class="ti ti-alert-circle"></i> ${message}</div>` : '';
    }

    async function searchOrder(){
      const raw = document.getElementById('searchInput').value.trim();
      if(!raw){ setSearchError('الرجاء إدخال رقم الطلب أو رقم الجوال'); return; }
      setSearchError('');
      const btn = document.getElementById('searchBtn');
      btn.disabled = true; btn.textContent = 'جاري البحث...';
      try{
        const normalizedPhone = normalizeSaudiPhone(raw);
        // Public tracking only surfaces active/ongoing orders — completed ones are
        // intentionally excluded from search results entirely.
        let orders = await fetchOrdersNarrow(raw, normalizedPhone);
        let found = findMatch(orders, raw, normalizedPhone);
        if(!found){
          // Narrow key/id/phone queries found nothing — the input may be a client
          // name, which equalTo can't express (trimmed/exact-string match), so
          // fall back to the full collection only in this case.
          orders = await fetchOrders();
          found = findMatch(orders, raw, normalizedPhone);
        }
        if(!found){ setSearchError('لم يتم العثور على طلب جارٍ مطابق. تحقق من رقم الطلب أو الجوال.'); return; }
        currentOrder = { _key: found[0], ...found[1] };
        displayOrder();
      }catch(e){
        setSearchError('تعذّر الاتصال بقاعدة البيانات، حاول مرة أخرى.');
      }finally{
        btn.disabled = false; btn.textContent = 'تتبع الطلب';
      }
    }

    function formatDate(v){
      if(!v) return '—';
      try{
        const d = new Date(v);
        if(isNaN(d.getTime())) return v;
        return d.toLocaleDateString('ar-SA', { year:'numeric', month:'long', day:'numeric' });
      }catch(e){ return v; }
    }

    function renderTrack(o){
      const seq = getActiveDepts(o);
      const nodes = [...seq.map(dk => ({key:dk, label:DEPT_META[dk].label})), {key:'done', label:'تسليم'}];
      const cur = o.currentDept || seq[0] || 'done';
      const curIdx = cur === 'done' ? nodes.length - 1 : nodes.findIndex(n => n.key === cur);
      let html = '<div class="track-row">';
      nodes.forEach((n, i) => {
        let st = '';
        if(cur === 'done'){ st = 'done'; }
        else if(i < curIdx){ st = 'done'; }
        else if(n.key === cur){ st = 'active'; }
        html += `<div class="track-node"><div class="track-dot ${st}"></div><div class="track-label ${st}">${n.label}</div></div>`;
        if(i < nodes.length - 1) html += `<div class="track-line ${st === 'done' ? 'done' : ''}"></div>`;
      });
      html += '</div>';
      return html;
    }

    function displayOrder(){
      const o = currentOrder;
      document.getElementById('resultClient').textContent = o.client || '—';
      document.getElementById('resultMeta').textContent = o.currentDept === 'done' ? 'تم إنجاز طلبك بالكامل' : 'طلبك قيد التنفيذ حالياً';
      document.getElementById('orderNumber').textContent = o.id || o._key || '—';
      document.getElementById('orderDate').textContent = formatDate(o.date || o.createdAt);
      document.getElementById('estimatedDelivery').textContent = (o.deadline && o.deadline !== '—') ? formatDate(o.deadline) : '—';
      document.getElementById('detailService').textContent = (o.orderItems && o.orderItems.length ? o.orderItems[0].name : o.service) || '—';
      document.getElementById('detailCreatedBy').textContent = o.createdBy || '—';
      document.getElementById('detailNotes').textContent = (o.notes && o.notes !== '—') ? o.notes : 'لا توجد ملاحظات';
      document.getElementById('progressTrack').innerHTML = renderTrack(o);
      document.getElementById('searchPage').classList.remove('active');
      document.getElementById('statusPage').classList.add('active');
    }

    function backToSearch(){
      document.getElementById('searchInput').value = '';
      setSearchError('');
      document.getElementById('statusPage').classList.remove('active');
      document.getElementById('searchPage').classList.add('active');
    }

    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if(e.key === 'Enter') searchOrder();
    });

    // Auto-load if an order id is passed in the URL (?id=ORD-014)
    (function(){
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('id');
      if(!orderId) return;
      window.addEventListener('load', async () => {
        try{
          let orders = await fbQuery('$key', orderId);
          if(!Object.keys(orders).length) Object.assign(orders, await fbQuery('id', orderId));
          let activeOrders = Object.entries(orders).filter(([, o]) => o.currentDept !== 'done');
          let found = activeOrders.find(([key, o]) => key === orderId || o.id === orderId);
          if(!found){
            const full = await fetchOrders();
            activeOrders = Object.entries(full).filter(([, o]) => o.currentDept !== 'done');
            found = activeOrders.find(([key, o]) => key === orderId || o.id === orderId);
          }
          if(found){
            currentOrder = { _key: found[0], ...found[1] };
            displayOrder();
          }else{
            setSearchError('لم يتم العثور على طلب جارٍ بهذا الرقم.');
          }
        }catch(e){
          setSearchError('تعذّر الاتصال بقاعدة البيانات، حاول مرة أخرى.');
        }
      });
    })();
  </script>
</body>
</html>
