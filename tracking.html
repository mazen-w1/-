<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تتبع الطلب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Changa:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #EFE3CB;
      color: #1a1a1a;
      line-height: 1.6;
    }

    .page {
      display: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page.active {
      display: flex;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 60px;
    }

    .logo-svg {
      position: relative;
      width: 80px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-name {
      font-family: 'Cairo', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #4A0E17;
      letter-spacing: -0.5px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      background: #D4AF37;
      border-radius: 50%;
      margin-right: 8px;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 16px;
      text-align: center;
    }

    .subtitle {
      font-size: 16px;
      color: #666;
      text-align: center;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .input-group {
      width: 100%;
      margin-bottom: 24px;
      position: relative;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input[type="text"],
    input[type="search"] {
      width: 100%;
      padding: 16px 20px 16px 48px;
      font-size: 16px;
      border: 1px solid rgba(74, 14, 23, 0.15);
      border-radius: 20px;
      background: #FDFBF7;
      font-family: 'Cairo', sans-serif;
      color: #1a1a1a;
      transition: all 0.3s ease;
    }

    input[type="text"]::placeholder,
    input[type="search"]::placeholder {
      color: #999;
    }

    input[type="text"]:focus,
    input[type="search"]:focus {
      outline: none;
      border-color: #4A0E17;
      background: #FDFBF7;
      box-shadow: 0 0 0 3px rgba(74, 14, 23, 0.05);
    }

    .input-icon {
      position: absolute;
      right: 16px;
      font-size: 20px;
      color: #999;
      pointer-events: none;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Cairo', sans-serif;
      margin-bottom: 12px;
    }

    .btn-primary {
      background: #4A0E17;
      color: #fff;
    }

    .btn-primary:hover {
      background: #631420;
      box-shadow: 0 8px 24px rgba(74, 14, 23, 0.15);
    }

    .btn-secondary {
      background: #FDFBF7;
      color: #4A0E17;
      border: 1px solid rgba(74, 14, 23, 0.2);
    }

    .btn-secondary:hover {
      border-color: #D4AF37;
      background: #FDFBF7;
    }

    .privacy-note {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 24px;
    }

    .card {
      width: 100%;
      background: #FDFBF7;
      border: 1px solid rgba(74, 14, 23, 0.08);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .success-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: rgba(34, 197, 94, 0.1);
      border-radius: 50%;
      margin: 0 auto 32px;
      font-size: 32px;
      color: #22C55E;
    }

    .order-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-bottom: 32px;
    }

    .order-field {
      display: flex;
      flex-direction: column;
    }

    .order-field label {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .order-field value {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .progress-container {
      width: 100%;
      margin-bottom: 32px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #E5E5E5;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4A0E17 0%, #631420 100%);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .progress-steps {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .progress-step {
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .step-indicator {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      background: #E5E5E5;
      color: #999;
      transition: all 0.3s ease;
    }

    .progress-step.completed .step-indicator {
      background: #22C55E;
      color: #fff;
    }

    .progress-step.active .step-indicator {
      background: #D4AF37;
      color: #4A0E17;
      box-shadow: 0 0 0 8px rgba(212, 175, 55, 0.1);
    }

    .step-label {
      font-size: 12px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .progress-step.upcoming .step-label {
      color: #999;
    }

    .details-section {
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid rgba(74, 14, 23, 0.08);
    }

    .details-section h3 {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 20px;
    }

    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 14px;
      color: #1a1a1a;
    }

    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 32px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #991B1B;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      font-weight: 500;
      margin-bottom: 16px;
      width: 100%;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3.5px solid rgba(74, 14, 23, 0.1);
      border-top-color: #4A0E17;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-left: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="searchPage" class="page active">
    <div class="container">
      <div class="header-brand">
        <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140">
          <defs>
            <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#B08D2B;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect x="32" y="10" width="5" height="50" fill="url(#goldGradient)" rx="2.5"/>
          <text x="60" y="75" font-family="Changa, Arial" font-size="85" font-weight="800" fill="#4A0E17" text-anchor="end">ر</text>
        </svg>
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
          <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
            <div class="brand-dot"></div>
            <span class="brand-name">روائع الأفكار</span>
          </div>
        </div>
      </div>

      <h1>تتبع الطلب</h1>
      <p class="subtitle">أدخل رقم الطلب أو رقم الجوال لمتابعة حالة طلبك</p>

      <div class="input-group">
        <div class="input-wrapper">
          <span class="input-icon">🔍</span>
          <input type="search" id="searchInput" placeholder="رقم الطلب أو رقم الجوال" />
        </div>
      </div>

      <button class="btn btn-primary" id="submitBtn" onclick="searchOrder()">تتبع الطلب</button>

      <p class="privacy-note">لن يتم استخدام بياناتك إلا لعرض حالة الطلب.</p>
    </div>
  </div>

  <div id="statusPage" class="page">
    <div class="container">
      <div class="header-brand" style="margin-bottom: 40px;">
        <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140">
          <defs>
            <linearGradient id="goldGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#B08D2B;stop-opacity:1" />
            </linearGradient>
          </defs>
          <rect x="32" y="10" width="5" height="50" fill="url(#goldGradient2)" rx="2.5"/>
          <text x="60" y="75" font-family="Changa, Arial" font-size="85" font-weight="800" fill="#4A0E17" text-anchor="end">ر</text>
        </svg>
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
          <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
            <div class="brand-dot"></div>
            <span class="brand-name">روائع الأفكار</span>
          </div>
        </div>
      </div>

      <div class="success-badge">✓</div>
      <h1>تم العثور على طلبك</h1>

      <div class="card">
        <div class="order-grid">
          <div class="order-field">
            <label>رقم الطلب</label>
            <value id="orderNumber">—</value>
          </div>
          <div class="order-field">
            <label>اسم العميل</label>
            <value id="customerName">—</value>
          </div>
          <div class="order-field">
            <label>تاريخ الطلب</label>
            <value id="orderDate">—</value>
          </div>
          <div class="order-field">
            <label>تاريخ التسليم المتوقع</label>
            <value id="estimatedDelivery">—</value>
          </div>
        </div>

        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-steps" id="progressSteps"></div>
        </div>
      </div>

      <div class="card">
        <div class="details-section">
          <h3>تفاصيل الطلب</h3>
          <div class="details-grid">
            <div class="detail-row">
              <div class="detail-label">العميل</div>
              <div class="detail-value" id="detailCustomer">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">منشئ الطلب</div>
              <div class="detail-value" id="detailRepresentative">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">نوع الطلب</div>
              <div class="detail-value" id="detailService">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">طريقة التسليم</div>
              <div class="detail-value" id="detailDeliveryMethod">توصيل / تركيب</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">تاريخ التسليم</div>
              <div class="detail-value" id="detailDeliveryDate">—</div>
            </div>
            <div class="detail-row">
              <div class="detail-label">ملاحظات الطلب</div>
              <div class="detail-value" id="detailNotes">—</div>
            </div>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn btn-secondary" onclick="backToSearch()">تتبع طلب آخر</button>
        <button class="btn btn-primary" onclick="backToSearch()">خروج</button>
      </div>
    </div>
  </div>

  <script>
    // رابط السيرفر المباشر لـ Realtime Database الخاص بروائع الأفكار الإعلانية
    const fbUrl = "https://rawaee-alafkar-default-rtdb.firebaseio.com";

    // مراحل خط الإنتاج المعتمدة بالكامل في نظام روائع v3 الداخلي
    const stages = [
      { id: 'design', label: 'التصميم' },
      { id: 'external', label: 'التنفيذ الخارجي' },
      { id: 'print', label: 'الطباعة' },
      { id: 'workshop', label: 'الورشة والتركيب' },
      { id: 'done', label: 'جاهز / مستلم' }
    ];

    let currentOrder = null;

    // تحويل الأرقام تلقائياً للإنجليزية لضمان الفرز البرمي الموثوق
    function toEnglishDigits(str) {
      const ar = '٠١٢٣٤٥٦٧٨٩', fa = '۰۱۲۳۴۵۶۷۸۹';
      return String(str).replace(/[٠-٩۰-۹]/g, d => {
        let i = ar.indexOf(d); if (i === -1) i = fa.indexOf(d);
        return i === -1 ? d : String(i);
      });
    }

    async function searchOrder() {
      const searchInput = document.getElementById('searchInput').value.trim();
      const cleanInput = toEnglishDigits(searchInput);

      if (!cleanInput) {
        alert('الرجاء إدخال رقم الطلب أو رقم الجوال');
        return;
      }

      removeError();
      showLoading(true);

      try {
        // سحب البيانات المباشر عبر طلب الـ REST API لفايربيس
        const response = await fetch(`${fbUrl}/orders.json`);
        if (!response.ok) throw new Error('تعذر الاتصال بخادم قاعدة البيانات');
        
        const orders = await response.json();
        showLoading(false);

        if (!orders) {
          showError('لا توجد أي طلبات مسجلة في النظام حالياً.');
          return;
        }

        // الفرز الشامل المتكامل والذكي للمطابقة مع المعرف البشري، الجوال، أو الاسم
        const found = Object.entries(orders)
          .map(([key, v]) => ({ ...v, _key: key }))
          .find(o => 
            (o.id && String(o.id).toLowerCase() === cleanInput.toLowerCase()) || 
            (o.phone && String(o.phone).includes(cleanInput)) || 
            (o.client && String(o.client).toLowerCase().includes(cleanInput.toLowerCase())) ||
            (o._key && o._key === cleanInput)
          );

        if (!found) {
          showError('لم يتم العثور على طلب مطابق. تحقق من رقم الطلب أو الجوال المكتوب.');
          return;
        }

        currentOrder = found;
        displayOrder();
      } catch (e) {
        showLoading(false);
        showError('خطأ في الاتصال: ' + e.message);
      }
    }

    function displayOrder() {
      const order = currentOrder;
      const curDept = order.currentDept || 'design';

      // دمج وتعبئة الحقول من قاعدة بيانات النظام الداخلي حرفياً
      document.getElementById('orderNumber').textContent = order.id || order._key || '—';
      document.getElementById('customerName').textContent = order.client || '—';
      document.getElementById('orderDate').textContent = formatDate(order.createdAt || order.date) || '—';
      document.getElementById('estimatedDelivery').textContent = formatDate(order.deadline) || '—';

      document.getElementById('detailCustomer').textContent = order.client || '—';
      document.getElementById('detailRepresentative').textContent = order.createdBy || '—';
      document.getElementById('detailService').textContent = order.service || '—';
      document.getElementById('detailDeliveryDate').textContent = formatDate(order.deadline) || '—';
      document.getElementById('detailNotes').textContent = order.notes || 'لا توجد ملاحظات خاصة على التنفيذ';

      // حساب وتمثيل شريط المؤشر الحركي
      let currentStageIndex = stages.findIndex(s => s.id === curDept);
      if (curDept === 'done' || order.status === 'مكتمل') currentStageIndex = stages.length - 1;
      if (currentStageIndex === -1) currentStageIndex = 0;

      const progressPercent = ((currentStageIndex) / (stages.length - 1)) * 100;
      document.getElementById('progressFill').style.width = progressPercent + '%';

      const stepsHTML = stages.map((stage, index) => {
        let statusClass = 'upcoming';
        let indicator = index + 1;

        if (index < currentStageIndex || curDept === 'done' || order.status === 'مكتمل') {
          statusClass = 'completed';
          indicator = '✓';
        } else if (index === currentStageIndex) {
          statusClass = 'active';
        }

        return `
          <div class="progress-step ${statusClass}">
            <div class="step-indicator">${indicator}</div>
            <div class="step-label">${stage.label}</div>
          </div>`;
      }).join('');

      document.getElementById('progressSteps').innerHTML = stepsHTML;
      document.getElementById('searchPage').classList.remove('active');
      document.getElementById('statusPage').classList.add('active');
    }

    function showLoading(status) {
      const searchBtn = document.getElementById('submitBtn');
      if (status) {
        searchBtn.disabled = true;
        searchBtn.innerHTML = '<div class="spinner"></div> جاري البحث عن الطلب...';
      } else {
        searchBtn.disabled = false;
        searchBtn.textContent = 'تتبع الطلب';
      }
    }

    function showError(message) {
      removeError();
      const container = document.querySelector('#searchPage .container');
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-message';
      errorDiv.textContent = message;
      container.insertBefore(errorDiv, container.querySelector('.input-group'));
    }

    function removeError() {
      const existingError = document.querySelector('.error-message');
      if (existingError) existingError.remove();
    }

    function backToSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('statusPage').classList.remove('active');
      document.getElementById('searchPage').classList.add('active');
      removeError();
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        const cleanDate = dateStr.includes('T') ? dateStr.split('T')[0] : dateStr;
        const date = new Date(cleanDate);
        if (isNaN(date.getTime())) return cleanDate;
        return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch {
        return dateStr;
      }
    }

    // لقطة القراءة المباشرة من روابط الـ QR المرفقة في عروض الأسعار ونظام العملاء
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');

    if (orderId) {
      window.addEventListener('load', async () => {
        document.getElementById('searchInput').value = orderId;
        searchOrder();
      });
    }

    // دعم مفتاح الـ Enter للبحث الفوري السريع
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchOrder();
    });
  </script>
</body>
</html>
