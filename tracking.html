<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>روائع الأفكار للإعلانات — بوابة العملاء الذكية</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%234A0E17'/%3E%3Ctext x='50' y='50' text-anchor='middle' dominant-baseline='central' font-family='Changa,sans-serif' font-weight='800' font-size='62' fill='%23fff'%3E%D8%B1%3C/text%3E%3Crect x='24' y='31' width='5' height='38' rx='2.5' fill='%23D4AF37'/%3E%3C/svg%3E"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Changa:wght@700;800&display=swap" rel="stylesheet"/>

<style>
:root {
  --maroon:       #4A0E17;
  --maroon-dark:  #1D0509;
  --maroon-mid:   #631420;
  --gold:         #D4AF37;
  --gold-light:   #F0D060;
  --gold-soft:    rgba(212,175,55,0.12);
  --bg:           #140507;
  --surface:      #FFFFFF;
  --surface-2:    #FAFAFB;
  --border:       #E8E2D9;
  --text-1:       #1A0F0A;
  --text-2:       #5C4A3A;
  --text-3:       #9B8878;
  --radius-md:    14px;
  --radius-lg:    18px;
  --radius-xl:    24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', sans-serif;
  background: radial-gradient(ellipse at 50% 30%, #3a1016 0%, #140507 70%, #080203 100%);
  color: var(--text-1);
  min-height: 100vh;
  padding: 20px;
}

/* 1. WELCOME LOGIN SCREEN */
.welcome-screen {
  max-width: 480px;
  margin: 80px auto 0;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(212, 175, 55, 0.25);
  border-radius: var(--radius-xl);
  padding: 35px 24px;
  backdrop-filter: blur(15px);
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.p-logo {
  width: 80px; height: 80px; margin: 0 auto 16px;
  border-radius: 50%; border: 2px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
}
.welcome-title { font-size: 24px; font-weight: 900; color: #fff; margin-bottom: 4px; }
.welcome-sub { font-size: 11px; color: var(--gold); font-weight: 700; letter-spacing: 1px; margin-bottom: 24px; }

/* 2. PREMIUM MAIN PORTAL VIEW */
.portal-layout { display: none; max-width: 1200px; margin: 0 auto; }

.app-header {
  background: rgba(74, 14, 23, 0.85);
  border: 1px solid rgba(212, 175, 55, 0.3);
  border-radius: var(--radius-lg);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; backdrop-filter: blur(10px);
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand-title { font-size: 16px; font-weight: 800; color: #fff; }
.brand-sub { font-size: 9.5px; color: var(--gold); font-weight: 600; }

.user-badge { display: flex; align-items: center; gap: 8px; }
.user-name { color: #fff; font-size: 13px; font-weight: 700; }
.badge-tag { background: var(--gold); color: var(--maroon-dark); font-size: 9.5px; font-weight: 800; padding: 2px 10px; border-radius: 12px; }

/* GRID CONTAINER */
.main-grid { display: grid; grid-template-columns: 1fr 1.1fr 1fr; gap: 16px; align-items: start; }
@media(max-width: 950px) { .main-grid { grid-template-columns: 1fr; } }

.card { background: var(--surface); border-radius: var(--radius-lg); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 1px solid var(--border); }
.card-title { font-size: 15px; font-weight: 800; color: var(--maroon); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; border-bottom: 2px solid var(--border-soft); padding-bottom: 8px; }

/* REPRODUCTION OF WORKFLOW CARDS */
.wf-block { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.wf-head { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 800; color: var(--text-3); }
.wf-name { font-size: 13px; font-weight: 800; color: var(--text-1); margin: 6px 0 12px; }

.track-row { display: flex; justify-content: space-between; position: relative; padding: 0 4px; }
.track-node { display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; z-index: 2; }
.track-dot { width: 10px; height: 10px; border-radius: 50%; background: #E2E8F0; border: 2px solid #fff; }
.track-node.done .track-dot { background: #10B981; }
.track-node.active .track-dot { background: var(--gold); box-shadow: 0 0 0 3px var(--gold-soft); }
.track-text { font-size: 9px; font-weight: 700; color: var(--text-3); }
.track-node.active .track-text { color: var(--maroon); font-weight: 800; }
.track-node.done .track-text { color: #059669; }

/* FINANCIALS MATRIX */
.fin-card { border-right: 4px solid var(--gold); }
.fin-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
.fin-label { color: var(--text-2); font-weight: 600; }
.fin-val { font-weight: 800; color: var(--text-1); }
.fin-total { font-weight: 900; color: var(--maroon); font-size: 13.5px; }

.split-details { font-size: 10.5px; color: var(--text-2); background: #FAF7F2; padding: 8px; border-radius: 6px; margin: 8px 0; border: 1px solid var(--border); }

/* FORMS */
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; text-align: right; }
.fg label { font-size: 11.5px; color: var(--text-2); font-weight: 700; }
.btn { width: 100%; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; transition: .15s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.btn-brand { background: var(--maroon); color: #fff; }
.btn-brand:hover { background: var(--maroon-mid); }
.btn-gold { background: var(--gold); color: var(--maroon-dark); font-weight: 800; }
.btn-out { background: transparent; border: 1px solid var(--border); color: var(--text-1); }
</style>
</head>
<body>

<!-- WATERMARK -->
<div class="site-watermark" aria-hidden="true"><span>ر</span></div>

<!-- 1. TACTICAL WELCOME LOGIN PHASE -->
<div class="welcome-screen" id="welcomePhase">
  <div class="p-logo">
    <svg viewBox="0 0 100 100" width="50" height="50">
      <circle cx="50" cy="50" r="48" fill="#4A0E17"/>
      <text x="50" y="52" text-anchor="middle" dominant-baseline="central" font-family="'Cairo', sans-serif" font-weight="900" font-size="55" fill="#fff">ر</text>
      <rect x="24" y="31" width="5" height="38" rx="2.5" fill="#D4AF37"/>
    </svg>
  </div>
  <div class="welcome-title">روائع الأفكار للإعلانات</div>
  <div class="welcome-sub">بوابة تتبع الطلبات والخدمات الذكية</div>
  
  <div class="fg">
    <input type="text" id="accessInput" placeholder="أدخل رقم الطلب أو رقم الجوال..." style="text-align: center; font-weight: 700; padding: 12px; border-radius: 10px;"/>
  </div>
  <button class="btn btn-gold" style="padding: 12px; font-size: 13.5px;" onclick="authenticateClientPortal()"><i class="ti ti-login"></i> الدخول للبوابة</button>
</div>

<!-- 2. LUXURY CLIENT PORTAL DASHBOARD -->
<div class="portal-layout" id="portalDashboardPhase">
  <header class="app-header">
    <div class="brand">
      <div class="brand-title">روائع الأفكار للإعلانات</div>
      <div class="brand-sub">بوابة تتبع الطلبات والخدمات الذكية</div>
    </div>
    <div class="user-badge">
      <span class="user-name" id="clientProfileName">العميل</span>
      <span class="badge-tag" id="employeeTag" style="display:none;">عميل / موظف</span>
    </div>
  </header>

  <div class="main-grid">
    
    <!-- COLUMN 1 (FAR LEFT): WARRANTY & MAINTENANCE -->
    <div class="card" id="maintenanceCardContainer" style="display: none;">
      <div class="card-title"><i class="ti ti-tool"></i> الضمان وطلب الصيانة</div>
      <form onsubmit="event.preventDefault(); alert('تم إرسال طلب الصيانة الفنية الفورية للورشة بنجاح.');">
        <div class="fg">
          <label>رقم الطلب / العقد</label>
          <select id="maintOrderSelect" onchange="loadOrderSubItems(this.value)"><option value="">اختر رقم الطلب...</option></select>
        </div>
        <div class="fg">
          <label>البند / اللوحة المطلوبة للصيانة</label>
          <select id="maintItemSelect"><option value="">اختر البند المخصص...</option></select>
        </div>
        <div class="fg">
          <label>وصف المشكلة / التعديل</label>
          <textarea placeholder="اكتب الملاحظات والتفاصيل هنا..." style="min-height: 70px; resize: none;"></textarea>
        </div>
        <div class="fg">
          <label>إرفاق صورة (اختياري)</label>
          <input type="file" accept="image/*" style="padding: 5px; font-size: 11px;"/>
        </div>
        <button type="submit" class="btn btn-brand"><i class="ti ti-send"></i> إرسال طلب الصيانة</button>
      </form>
    </div>

    <!-- COLUMN 2 (CENTER): QUOTATIONS & NEW QUOTE REQUEST -->
    <div class="card">
      <div class="card-title"><i class="ti ti-receipt-2"></i> عروض الأسعار والطلبات</div>
      
      <!-- Trigger for new quote request -->
      <button class="btn btn-out" style="margin-bottom: 14px; background: var(--gold-soft); border-color: var(--gold);" onclick="requestNewQuotationPopup()"><i class="ti ti-file-plus"></i> طلب عرض سعر جديد</button>
      
      <div id="quotationsListSlot"></div>
    </div>

    <!-- COLUMN 3 (FAR RIGHT): LIVE PRODUCTION WORKFLOW LINE -->
    <div class="card">
      <div class="card-title"><i class="ti ti-git-commit"></i> سير الأعمال المباشر</div>
      <div id="productionWorkflowSlot"></div>
    </div>

  </div>
</div>

<script>
// Isolated Mock Data Mapping to reflect the attached screenshot structure
const portalDatabase = {
  "0550000000": {
    name: "عبدالعزيز محمد",
    isEmployee: true,
    orders: [
      {
        id: "ORD-9081",
        title: "كلادينج وحروف زنكور",
        phase: "print", // design | print | execution
        total: 12500, remaining: 3500,
        splitPayments: "كاش: 5000 ريال | شبكة: 4000 ريال",
        items: ["لوحة واجهة رئيسية کلادينج", "حروف زنكور مضيئة"],
        linkedToWorkshop: true // This enforces showing the maintenance card
      },
      {
        id: "ORD-9082",
        title: "مطبوعات واستيكرات",
        phase: "design",
        total: 1800, remaining: 0,
        splitPayments: "تحويل: 1800 ريال",
        items: ["استيكر سيارات داخلي"],
        linkedToWorkshop: false
      }
    ]
  }
};

function authenticateClientPortal() {
  const input = document.getElementById("accessInput").value.trim();
  if (!input) return;

  // Search profile by phone or specific hardcoded id match
  const profile = portalDatabase[input] || portalDatabase["0550000000"]; 
  
  document.getElementById("welcomePhase").style.display = "none";
  document.getElementById("portalDashboardPhase").style.display = "block";
  
  // Set Client Visual Profile Details
  document.getElementById("clientProfileName").textContent = profile.name;
  if (profile.isEmployee) document.getElementById("employeeTag").style.display = "inline-block";

  // Check if any order touches the workshop to display the maintenance section
  const hasWorkshopLink = profile.orders.some(o => o.linkedToWorkshop);
  if (hasWorkshopLink) {
    document.getElementById("maintenanceCardContainer").style.display = "block";
    populateMaintenanceDropdowns(profile.orders);
  }

  renderWorkflowSection(profile.orders);
  renderFinancialSection(profile.orders);
}

function renderWorkflowSection(orders) {
  const slot = document.getElementById("productionWorkflowSlot");
  slot.innerHTML = orders.map(o => `
    <div class="wf-block">
      <div class="wf-head"><span>رقم الطلب</span><strong>${o.id}</strong></div>
      <div class="wf-name">${o.title}</div>
      <div class="track-row">
        <div class="track-node ${o.phase==='design'?'active': 'done'}"><div class="track-dot"></div><span class="track-text">تصميم</span></div>
        <div class="track-node ${o.phase==='print'?'active': (o.phase==='execution'?'done':'')}"><div class="track-dot"></div><span class="track-text">طباعة</span></div>
        <div class="track-node ${o.phase==='execution'?'active':''}"><div class="track-dot"></div><span class="track-text">تنفيذ</span></div>
      </div>
    </div>
  `).join('');
}

function renderFinancialSection(orders) {
  const slot = document.getElementById("quotationsListSlot");
  slot.innerHTML = orders.map(o => `
    <div class="wf-block fin-card">
      <div class="fin-row"><span class="fin-label">${o.id} - ${o.title}</span><span class="fin-total">${o.total} ريال</span></div>
      <div class="fin-row"><span class="fin-label">المتبقي:</span><span class="fin-val" style="color:var(--maroon); font-weight:800;">${o.remaining} ريال</span></div>
      <div class="split-details"><strong>تفاصيل المدفوعات:</strong> ${o.splitPayments}</div>
      <button class="btn btn-brand btn-xs" style="margin-top:4px;" onclick="alert('جاري تنزيل ملف العرض الصافي...')"><i class="ti ti-download"></i> تنزيل العرض PDF</button>
    </div>
  `).join('');
}

function populateMaintenanceDropdowns(orders) {
  const select = document.getElementById("maintOrderSelect");
  orders.filter(o => o.linkedToWorkshop).forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.id; opt.textContent = `${o.id} - ${o.title} (تحت الضمان)`;
    select.appendChild(opt);
  });
}

function loadOrderSubItems(orderId) {
  const itemSelect = document.getElementById("maintItemSelect");
  itemSelect.innerHTML = '<option value="">اختر البند المخصص...</option>';
  if (!orderId) return;

  // Pull mock profile again to extract specific item lines
  const orders = portalDatabase["0550000000"].orders;
  const match = orders.find(o => o.id === orderId);
  if (match && match.items) {
    match.items.forEach(it => {
      const opt = document.createElement("option");
      opt.value = it; opt.textContent = it;
      itemSelect.appendChild(opt);
    });
  }
}

function requestNewQuotationPopup() {
  const desc = prompt("يرجى كتابة مواصفات اللوحة أو المطبوعات المطلوبة لرفعها لقسم المبيعات:");
  if (desc) alert("تم رفع طلبك بنجاح. سيقوم مسؤول المبيعات بإصدار عرض السعر وإرساله لحسابك هنا فوراً.");
}
</script>

</body>
</html>
