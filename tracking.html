<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة العملاء وتتبع الطلبات — روائع الأفكار للإعلانات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #1a0a0c;
      --burgundy: #4A0E17;
      --burgundy-light: #631420;
      --gold: #D4AF37;
      --gold-soft: rgba(212, 175, 55, 0.15);
      --surface: #FFFFFF;
      --surface-sub: #FDFBF7;
      --border: #E8E2D9;
      --text-main: #1A0F0A;
      --text-muted: #6B5E52;
      --success: #10B981;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Cairo', -apple-system, sans-serif;
      background: var(--bg-dark);
      background: radial-gradient(ellipse at 30% 20%, #3a1016 0%, #1a0a0c 70%, #0d0507 100%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 16px;
      line-height: 1.5;
    }

    /* Top Navbar Header */
    .app-header {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto 20px auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.3);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: var(--radius-lg);
    }

    .brand-identity {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .p-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 16px;
      font-weight: 800;
      color: #FFF;
    }

    .brand-text p {
      font-size: 10px;
      color: var(--gold);
      font-weight: 700;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-name {
      color: #FFF;
      font-size: 13px;
      font-weight: 700;
    }

    .badge-emp {
      background: var(--gold);
      color: var(--burgundy);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* Main Container Grid */
    .portal-container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 14px;
      font-weight: 800;
      color: var(--burgundy);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--surface-sub);
      padding-bottom: 8px;
    }

    /* 1. Trackers Layout (سير الأعمال) */
    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .order-mini-card {
      background: var(--surface-sub);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
    }

    .order-id {
      font-size: 11px;
      font-weight: 800;
      color: var(--burgundy);
    }

    .order-title {
      font-size: 12px;
      font-weight: 700;
      margin: 4px 0 8px 0;
    }

    .workflow-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      margin-top: 6px;
    }

    .wf-step {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-muted);
      text-align: center;
    }

    .wf-step.active {
      color: var(--burgundy);
      font-weight: 900;
    }

    .wf-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      margin: 0 auto 2px auto;
    }

    .wf-step.active .wf-dot {
      background: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-soft);
    }

    /* 2. Financial Grid */
    .quotation-item {
      background: var(--surface-sub);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 10px;
      border-right: 4px solid var(--gold);
    }

    .fin-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .fin-label { color: var(--text-muted); font-weight: 600; }
    .fin-val { font-weight: 800; color: var(--text-main); }
    .fin-rem { color: var(--burgundy); font-weight: 900; }

    .split-payments {
      background: rgba(0,0,0,0.02);
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      margin-top: 6px;
      font-size: 10.5px;
    }

    .btn-action-group {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .btn {
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s;
    }

    .btn-burgundy { background: var(--burgundy); color: #FFF; }
    .btn-burgundy:hover { background: var(--burgundy-light); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }

    /* 3. Maintenance Form */
    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      padding: 8px 12px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface-sub);
      font-family: inherit;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--gold);
    }

    /* Isolated PDF Container (For Clean Exports) */
    #pdfExportCanvas {
      display: none;
      background: #ffffff !important;
      color: #000000 !important;
      padding: 30px;
      font-family: 'Cairo', sans-serif;
    }

    @media (max-width: 768px) {
      body { padding: 8px; }
      .portal-container { grid-template-columns: 1fr; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <header class="app-header">
    <div class="brand-identity">
      <div class="p-logo">
        <svg viewBox="0 0 100 100" width="28" height="28">
          <text x="50" y="55" text-anchor="middle" dominant-baseline="central" font-family="'Cairo', sans-serif" font-weight="900" font-size="60" fill="#FFF">ر</text>
          <rect x="20" y="10" width="6" height="40" rx="3" fill="#D4AF37"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>روائع الأفكار للإعلانات</h1>
        <p>بوابة تتبع الطلبات والخدمات الذكية</p>
      </div>
    </div>
    
    <div class="user-profile" id="userProfileArea">
      <!-- Dynamic Injection -->
    </div>
  </header>

  <main class="portal-container">
    
    <!-- Module 1: Compact Workflows -->
    <section class="card">
      <div class="card-title">
        <span>سير الأعمال المباشر</span>
        <span style="font-size: 10px; color: var(--gold); font-weight: 700;">مُحدث الآن</span>
      </div>
      <div class="track-grid" id="trackersList">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- Module 2: Financials & Quotations -->
    <section class="card">
      <div class="card-title">
        <span>عروض الأسعار والطلبات</span>
      </div>
      <div id="quotationList">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- Module 3: Warranties & Maintenance Request -->
    <section class="card">
      <div class="card-title">
        <span>الضمان وطلب الصيانة</span>
      </div>
      
      <form id="maintenanceForm" onsubmit="handleMaintenanceSubmit(event)">
        <div class="form-group">
          <label>رقم الطلب / العقد</label>
          <select id="orderSelect" class="form-control" onchange="populateItemSubSelector()" required>
            <option value="">اختر رقم الطلب...</option>
          </select>
        </div>

        <div class="form-group">
          <label>البند / اللوحة المطلوبة للصيانة</label>
          <select id="itemSubSelect" class="form-control" required disabled>
            <option value="">حدد رقم الطلب أولاً</option>
          </select>
        </div>

        <div class="form-group">
          <label>وصف المشكلة / التعديل</label>
          <textarea id="issueNotes" class="form-control" rows="2" placeholder="اكتب التفاصيل هنا..." required></textarea>
        </div>

        <div class="form-group">
          <label>إرفاق صورة (اختياري)</label>
          <input type="file" id="attachmentInput" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-burgundy" style="width: 100%; margin-top: 4px;">إرسال طلب الصيانة</button>
      </form>
    </section>

  </main>

  <!-- Isolated PDF Layout for Clean Exporting -->
  <div id="pdfExportCanvas">
    <div style="text-align: center; border-bottom: 2px solid #4A0E17; padding-bottom: 12px; margin-bottom: 16px;">
      <h2 style="color: #4A0E17; margin: 0;">روائع الأفكار للإعلانات</h2>
      <p style="font-size: 12px; color: #555;">عرض سعر رسمي - وثيقة رقمية</p>
    </div>
    <div id="pdfExportBody"></div>
  </div>

  <script>
    // State Management & Mock Data Mapping
    const customerState = {
      profile: {
        name: "عبدالعزيز محمد",
        isEmployee: true
      },
      orders: [
        {
          id: "ORD-9081",
          title: "كلادينج وحروف زنكور",
          currentPhase: "printing", // design | printing | external
          total: 12500,
          remaining: 3500,
          payments: { cash: 5000, network: 4000 },
          items: ["واجهة كلادينج رئيسية", "شعار بارز مضيء"],
          hasWarranty: true
        },
        {
          id: "ORD-9082",
          title: "مطبوعات واستيكرات",
          currentPhase: "design",
          total: 1800,
          remaining: 0,
          payments: { transfer: 1800 },
          items: ["استيكر سيارات 3M", "كروت شخصية"],
          hasWarranty: false
        }
      ]
    };

    // Initialize Page
    document.addEventListener("DOMContentLoaded", () => {
      renderHeaderProfile();
      renderTrackers();
      renderFinancials();
      populateOrderSelector();
    });

    // 1. Render Profile Header
    function renderHeaderProfile() {
      const area = document.getElementById("userProfileArea");
      const { name, isEmployee } = customerState.profile;
      area.innerHTML = `
        <span class="user-name">${name}</span>
        ${isEmployee ? `<span class="badge-emp">عميل / موظف</span>` : ''}
      `;
    }

    // 2. Render Trackers
    function renderTrackers() {
      const list = document.getElementById("trackersList");
      list.innerHTML = customerState.orders.map(o => `
        <div class="order-mini-card">
          <div class="order-id">${o.id}</div>
          <div class="order-title">${o.title}</div>
          <div class="workflow-line">
            <div class="wf-step ${o.currentPhase === 'design' ? 'active' : ''}">
              <div class="wf-dot"></div>تصميم
            </div>
            <div class="wf-step ${o.currentPhase === 'printing' ? 'active' : ''}">
              <div class="wf-dot"></div>طباعة
            </div>
            <div class="wf-step ${o.currentPhase === 'external' ? 'active' : ''}">
              <div class="wf-dot"></div>تنفيذ
            </div>
          </div>
        </div>
      `).join('');
    }

    // 3. Render Financials
    function renderFinancials() {
      const container = document.getElementById("quotationList");
      container.innerHTML = customerState.orders.map(o => {
        const p = o.payments;
        const splitText = Object.keys(p).map(k => `${k === 'cash' ? 'كاش' : k === 'network' ? 'شبكة' : 'تحويل'}: ${p[k]} ريال`).join(' | ');

        return `
          <div class="quotation-item">
            <div class="fin-row">
              <span class="fin-label">${o.id} - ${o.title}</span>
              <span class="fin-val">${o.total} ريال</span>
            </div>
            <div class="fin-row">
              <span class="fin-label">المتبقي:</span>
              <span class="fin-rem">${o.remaining} ريال</span>
            </div>
            <div class="split-payments">
              <strong>تفاصيل المدفوعات:</strong> ${splitText}
            </div>
            <div class="btn-action-group">
              <button class="btn btn-burgundy" onclick="exportCleanPDF('${o.id}')">تنزيل العرض PDF</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // 4. Warranty & Maintenance Cascading Dropdowns
    function populateOrderSelector() {
      const select = document.getElementById("orderSelect");
      customerState.orders.forEach(o => {
        const opt = document.createElement("option");
        opt.value = o.id;
        opt.textContent = `${o.id} - ${o.title} ${o.hasWarranty ? '(تحت الضمان)' : ''}`;
        select.appendChild(opt);
      });
    }

    function populateItemSubSelector() {
      const orderId = document.getElementById("orderSelect").value;
      const itemSelect = document.getElementById("itemSubSelect");
      
      itemSelect.innerHTML = '<option value="">اختر البند المخصص...</option>';
      
      if (!orderId) {
        itemSelect.disabled = true;
        return;
      }

      const targetOrder = customerState.orders.find(o => o.id === orderId);
      if (targetOrder && targetOrder.items) {
        targetOrder.items.forEach(item => {
          const opt = document.createElement("option");
          opt.value = item;
          opt.textContent = item;
          itemSelect.appendChild(opt);
        });
        itemSelect.disabled = false;
      }
    }

    // 5. Clean PDF Export (Eliminating Black Screen Engine Error)
    function exportCleanPDF(orderId) {
      const order = customerState.orders.find(o => o.id === orderId);
      const canvas = document.getElementById("pdfExportCanvas");
      const body = document.getElementById("pdfExportBody");

      body.innerHTML = `
        <p><strong>رقم الطلب:</strong> ${order.id}</p>
        <p><strong>اسم الخدمة:</strong> ${order.title}</p>
        <p><strong>الإجمالي:</strong> ${order.total} ريال</p>
        <p><strong>المتبقي:</strong> ${order.remaining} ريال</p>
        <hr style="margin: 12px 0;">
        <p style="font-size: 11px;">شروط العرض: يسري هذا العرض لمدة 15 يوماً من تاريخ الإصدار.</p>
      `;

      // Display clean layout, print, and hide
      canvas.style.display = "block";
      window.print();
      canvas.style.display = "none";
    }

    function handleMaintenanceSubmit(e) {
      e.preventDefault();
      alert("تم إرسال طلب الصيانة بنجاح، سيتم التواصل معكم قريباً.");
      e.target.reset();
      document.getElementById("itemSubSelect").disabled = true;
    }
  </script>
</body>
</html>
